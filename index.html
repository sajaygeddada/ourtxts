<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2325d366'/><text y='.9em' font-size='60' x='18'>💬</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-bubble">
        <svg viewBox="0 0 24 24" fill="white" width="28" height="28"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div>
        <h1>Cipher</h1>
        <p>Private messaging</p>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="tab active" id="tab-in" onclick="switchTab('in')">Sign In</button>
      <button class="tab" id="tab-up" onclick="switchTab('up')">Sign Up</button>
    </div>

    <div id="form-in">
      <div class="field">
        <label>Email</label>
        <input type="email" id="in-email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="in-pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-main" onclick="doLogin()">Sign In</button>
    </div>

    <div id="form-up" style="display:none">
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="up-name" placeholder="Sajay" autocomplete="off"/>
      </div>
      <div class="field">
        <label>Username <span class="hint">(your @ID — others use this to find you)</span></label>
        <input type="text" id="up-uname" placeholder="sajay007" autocomplete="off"
          oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="up-email" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="up-pass" placeholder="min 6 characters" autocomplete="new-password"/>
      </div>
      <button class="btn-main" onclick="doSignup()">Create Account</button>
    </div>

    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">
  <div class="layout" id="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="s-avatar" id="s-avatar" onclick="showMyId()"></div>
        <span class="s-title">Cipher</span>
        <button class="icon-btn" title="New chat" onclick="openNewChat()">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
        </button>
        <button class="icon-btn" title="Sign out" onclick="doLogout()">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>

      <div class="s-me-chip">
        <div class="chip-dot"></div>
        <div>
          <div class="chip-name" id="chip-name"></div>
          <div class="chip-id" id="chip-id"></div>
        </div>
      </div>

      <div class="s-search">
        <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15" style="color:var(--t3);flex-shrink:0"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16a6.47 6.47 0 0 0 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Search chats" id="search-in" oninput="filterList(this.value)"/>
      </div>

      <div class="contacts" id="contacts-list"></div>
    </aside>

    <!-- CHAT PANEL -->
    <main class="chat-panel" id="chat-panel">
      <div class="chat-empty" id="chat-empty">
        <div class="empty-icon">💬</div>
        <h2>Cipher Chat</h2>
        <p>Select a conversation or start a new one</p>
      </div>
      <div id="chat-view" style="display:none;flex-direction:column;height:100%">
        <div class="chat-top">
          <button class="icon-btn back-btn" onclick="closeChat()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <div class="ct-av" id="ct-av"></div>
          <div class="ct-info">
            <div class="ct-name" id="ct-name"></div>
            <div class="ct-sub" id="ct-sub"></div>
          </div>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="input-row">
          <div class="input-box">
            <textarea id="msg-input" placeholder="Type a message…" rows="1"
              onkeydown="handleKey(event)" oninput="growInput(this)"></textarea>
          </div>
          <button class="send-btn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" fill="white" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </main>

  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="overlay" id="nc-overlay" onclick="closeNewChat()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>New Chat</h3>
    <p>Enter the @username of the person you want to message.</p>
    <div class="field" style="margin-top:16px">
      <label>Username</label>
      <input type="text" id="nc-input" placeholder="amrusha"
        oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"/>
    </div>
    <div id="nc-msg" class="auth-msg" style="margin-top:10px;min-height:16px"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNewChat()">Cancel</button>
      <button class="btn-main" style="flex:1" onclick="startChat()">Start Chat</button>
    </div>
  </div>
</div>

<!-- MY ID MODAL -->
<div class="overlay" id="id-overlay" onclick="closeMyId()">
  <div class="modal" onclick="event.stopPropagation()" style="text-align:center">
    <h3>Your Cipher ID</h3>
    <div class="my-id-badge" id="my-id-badge"></div>
    <p style="font-size:13px;color:var(--t2);line-height:1.6;margin-top:12px">
      Share this username with anyone who wants to message you.<br>
      They'll search for it in "New Chat".
    </p>
    <button class="btn-main" style="margin-top:16px" onclick="copyId()">Copy Username</button>
    <div id="copy-msg" style="font-size:12px;color:var(--green);margin-top:8px;min-height:16px"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
